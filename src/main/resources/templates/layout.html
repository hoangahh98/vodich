<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Vô Địch Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/app.css" rel="stylesheet">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
</head>
<body>
<nav class="navbar navbar-dark bg-dark topbar" th:fragment="topbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold" href="/">Vô Địch Tool</a>
        <div class="d-flex align-items-center gap-2">
            <span class="text-white-50 small" th:if="${currentUser}" th:text="${currentUser.displayName()}">Admin</span>
            <form method="post" action="/logout">
                <button class="btn btn-sm btn-outline-danger" data-loading-text="...">Đăng xuất</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
