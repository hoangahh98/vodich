<!doctype html>
<html lang="vi">
<head th:replace="~{layout :: head('Thành viên')}"></head>
<body>
<nav th:replace="~{layout :: topbar}"></nav>
<main class="app-shell">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0">Quản lý thành viên</h1>
        <a class="btn btn-outline-secondary" href="/">Trang chủ</a>
    </div>
    <section class="card-lite p-3 mb-3">
        <div class="alert alert-warning" th:if="${error != null and !error.isBlank()}" th:text="${error}"></div>
        <form class="row g-2" method="post" action="/players">
            <div class="col-md-3"><input class="form-control" name="displayName" placeholder="Họ tên" required></div>
            <div class="col-md-3"><input class="form-control" type="email" name="email" placeholder="Email" required></div>
            <div class="col-md-2">
                <select class="form-select" name="skillLevel">
                    <option value="">Chưa chọn trình</option>
                    <option>A</option><option>B</option><option>C</option><option>D</option>
                </select>
            </div>
            <div class="col-md-3"><input class="form-control" name="notes" placeholder="Ghi chú"></div>
            <div class="col-md-1"><button class="btn btn-success w-100 fw-bold" data-loading-text="...">Thêm</button></div>
        </form>
    </section>
    <section class="card-lite p-0">
        <div class="card-header bg-primary text-white fw-bold">Danh sách thành viên</div>
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark"><tr><th>Tên</th><th>Email</th><th>Trình</th></tr></thead>
                <tbody>
                <tr th:each="p : ${players}">
                    <td class="fw-bold" th:text="${p.displayName}"></td>
                    <td class="text-muted small" th:text="${p.email}"></td>
                    <td><span class="badge text-bg-secondary" th:text="${p.skillLevel ?: '-'}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script src="/js/app.js"></script>
</body>
</html>
