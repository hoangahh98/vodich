version: 2
updates:
  # Cập nhật thư viện npm hằng tuần, gom minor/patch vào 1 PR cho gọn.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
  # Cập nhật các GitHub Action dùng trong CI.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
