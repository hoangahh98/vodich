{% extends "base.html" %}
{% block content %}
<div class="page-shell">
    <h1 class="h3 mb-3 text-success fw-bold">🌴 Chuyến đi của tôi</h1>
    <div class="row g-3">
        {% for trip in trips %}
        <div class="col-md-4">
            <section class="card h-100">
                <div class="card-body">
                    <h2 class="h5 text-success fw-bold">{{ trip[1] }}</h2>
                    <p class="text-muted">{{ trip[2] or 'Chưa có ghi chú' }}</p>
                    <div class="small text-muted mb-3">Tên trong chuyến đi: {{ trip[3] }}</div>
                    <a class="btn btn-primary w-100" href="/nguoi-xem/chuyen-di/{{ trip[0] }}">Xem thu chi</a>
                </div>
            </section>
        </div>
        {% endfor %}
    </div>
    {% if not trips %}<div class="alert alert-info">Tài khoản này chưa được gắn vào chuyến đi nào.</div>{% endif %}
</div>
{% endblock %}
