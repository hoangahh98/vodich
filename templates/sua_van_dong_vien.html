<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa VĐV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include '_pwa_head.html' %}
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">✏️ CHỈNH SỬA VĐV</span>
            <a href="{{ vdv_list_url }}" class="btn btn-sm btn-outline-light">⬅️ Quay lại</a>
        </div>
    </nav>

    <div class="container mt-4" style="max-width: 560px;">
        <div class="card shadow-sm">
            <div class="card-body">
                {% if errors %}
                <div class="alert alert-danger">
                    <ul class="mb-0">
                        {% for error in errors %}
                        <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
                {% endif %}
                <form action="/van-dong-vien/{{ vdv[0] }}/sua?return_to={{ return_to|urlencode }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tên VĐV <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="ten_vdv" value="{{ vdv[1] }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" name="email" value="{{ vdv[3] }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Trình Độ</label>
                        <select class="form-select" name="trinh_do">
                            <option value="A" {% if vdv[2] == 'A' %}selected{% endif %}>A (Pro)</option>
                            <option value="B" {% if vdv[2] == 'B' %}selected{% endif %}>B (Advanced)</option>
                            <option value="C" {% if vdv[2] == 'C' %}selected{% endif %}>C (Intermediate)</option>
                            <option value="D" {% if vdv[2] == 'D' %}selected{% endif %}>D (Beginner)</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ghi Chú</label>
                        <textarea class="form-control" name="ghi_chu" rows="3">{{ vdv[5] or '' }}</textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">💾 LƯU THAY ĐỔI</button>
                        <a href="{{ vdv_list_url }}" class="btn btn-secondary">HỦY</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% include '_pwa_register.html' %}
{% include '_interaction_feedback.html' %}
</body>
</html>
