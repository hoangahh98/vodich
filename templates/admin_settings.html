{% extends "base.html" %}
{% block content %}
<div class="page-shell">
    <a href="/chuyen-di" class="small text-decoration-none">← Quan ly chuyen di</a>
    <h1 class="h3 mb-3">Quan ly admin</h1>
    <section class="panel mb-4">
        <h2 class="h5 mb-3">Them admin</h2>
        <form action="/admin-settings/them" method="POST" class="row g-2 align-items-end">
            <div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required></div>
            <div class="col-md-3"><label class="form-label">Ten hien thi</label><input class="form-control" name="display_name" value="Admin"></div>
            <div class="col-md-3"><label class="form-label">Mat khau</label><input class="form-control" name="password" type="password" required></div>
            <div class="col-md-2 d-grid"><button class="btn btn-success">Them</button></div>
        </form>
    </section>
    <section class="panel">
        <h2 class="h5 mb-3">Danh sach admin</h2>
        <div class="table-responsive">
            <table class="table align-middle">
                <thead><tr><th>Email</th><th>Ten hien thi</th><th>Mat khau moi</th><th></th></tr></thead>
                <tbody>
                    {% for admin in admins %}
                    <tr>
                        <form id="admin-form-{{ admin[0] }}" action="/admin-settings/{{ admin[0] }}/sua" method="POST"></form>
                        <td><input form="admin-form-{{ admin[0] }}" class="form-control" type="email" name="email" value="{{ admin[1] }}" {% if admin[1] == super_admin_email %}readonly{% endif %}></td>
                        <td><input form="admin-form-{{ admin[0] }}" class="form-control" name="display_name" value="{{ admin[2] }}"></td>
                        <td><input form="admin-form-{{ admin[0] }}" class="form-control" type="password" name="password" placeholder="Bo trong neu khong doi"></td>
                        <td class="text-end">
                            <button form="admin-form-{{ admin[0] }}" class="btn btn-sm btn-primary">Luu</button>
                            {% if admin[1] != super_admin_email %}
                            <form action="/admin-settings/{{ admin[0] }}/xoa" method="POST" class="d-inline" onsubmit="return confirm('Xoa admin nay?')">
                                <button class="btn btn-sm btn-outline-danger">Xoa</button>
                            </form>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
