<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .btn-admin { background: linear-gradient(90deg, #667eea, #764ba2); border: none; }
        .btn-admin:hover { background: linear-gradient(90deg, #764ba2, #667eea); color: white; }
    </style>
    {% include '_pwa_head.html' %}
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card login-card">
                    <div class="card-body p-5">
                        <h1 class="text-center mb-4">🏸 PICKLEBALL</h1>
                        <h5 class="text-center mb-4 text-muted">Tournament Manager</h5>

                        {% if error %}
                        <div class="alert alert-danger">❌ {{ error }}</div>
                        {% endif %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">📧 User/Email <span class="text-danger">*</span></label>
                                <input type="text" class="form-control form-control-lg" name="email" required autofocus>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">🔐 Mật Khẩu <span class="text-danger">*</span></label>
                                <input type="password" class="form-control form-control-lg" name="password" required>
                                <small class="text-muted">VĐV: 123456789</small>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold">👤 Vai Trò <span class="text-danger">*</span></label>
                                <select class="form-select form-select-lg" name="role" required>
                                    <option value="vdv">🏃 Vận Động Viên</option>
                                    <option value="admin">👨‍💼 Admin</option>
                                </select>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-admin btn-lg fw-bold text-white">
                                    🔓 ĐĂNG NHẬP
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% include '_pwa_register.html' %}
{% include '_interaction_feedback.html' %}
</body>
</html>
