{% extends "base.html" %}
{% block content %}
<div class="login-wrap">
    <section class="login-panel">
        <h1 class="text-success fw-bold mb-1">🏖️ Thu chi du lịch</h1>
        <p class="text-muted mb-4">Đăng nhập để quản lý hoặc xem chi phí chuyến đi.</p>
        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST" class="vstack gap-3">
            <div>
                <label class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control form-control-lg" name="email" required autofocus>
            </div>
            <div>
                <label class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" class="form-control form-control-lg" name="password" required>
            </div>
            <div>
                <label class="form-label fw-semibold">Vai trò</label>
                <select class="form-select form-select-lg" name="role">
                    <option value="viewer">Người xem</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button class="btn btn-success btn-lg fw-bold" type="submit">Đăng nhập</button>
        </form>
    </section>
</div>
{% endblock %}
