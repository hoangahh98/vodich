<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Đội Bóng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include '_pwa_head.html' %}
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">SỬA ĐỘI BÓNG</span>
            <a href="/doi-bong" class="btn btn-sm btn-outline-light">Quay lại</a>
        </div>
    </nav>

    <main class="container" style="max-width:720px;">
        {% if errors %}
        <div class="alert alert-danger">
            {% for error in errors %}<div>{{ error }}</div>{% endfor %}
        </div>
        {% endif %}
        <div class="card shadow-sm">
            <div class="card-body">
                <form action="/doi-bong/{{ doi_bong[0] }}/sua" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên đội bóng</label>
                        <input type="text" class="form-control" name="ten_doi" value="{{ doi_bong[1] }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ghi chú</label>
                        <textarea class="form-control" name="mo_ta" rows="3">{{ doi_bong[2] or '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/doi-bong" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn btn-success">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
